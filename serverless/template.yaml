AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: DocuPilot backend

Parameters:
  Stage:
    Type: String
    Default: dev

  ClerkIssuer:
    Type: String
    Description: Clerk JWT issuer URL from the JWT `iss` claim.

  ClerkAudience:
    Type: String
    Description: Clerk JWT audience from the JWT `aud` claim.
    Default: docupilot-api

  GeminiApiKeyParameterName:
    Type: String
    Description: SSM parameter name that stores the Gemini API key.
    Default: /docupilot/dev/GEMINI_API_KEY

Globals:
  Function:
    # Runtime upgraded from nodejs20.x to nodejs22.x because Node.js 20 is deprecated in AWS Lambda.
    Runtime: nodejs22.x
    Architectures:
      - arm64
    Timeout: 30
    MemorySize: 512
    Tracing: Active
    Environment:
      Variables:
        STAGE: !Ref Stage
        DOCUMENTS_TABLE: !Ref DocumentsTable
        DOCUMENTS_BUCKET: !Ref DocumentsBucket
        GEMINI_API_KEY_PARAMETER: !Ref GeminiApiKeyParameterName

Resources:
  # S3 bucket for original document uploads.
  DocumentsBucket:
    Type: AWS::S3::Bucket
    Properties:
      NotificationConfiguration:
        EventBridgeConfiguration:
          EventBridgeEnabled: true
      CorsConfiguration:
        CorsRules:
          - AllowedMethods: [PUT, GET, HEAD]
            AllowedOrigins:
              - "http://localhost:3000"
              - "https://docu-pilot-client.vercel.app"
            AllowedHeaders: ["*"]
            ExposedHeaders: ["ETag"]
            MaxAge: 3000

  # DynamoDB table with composite primary key (PK, SK).
  DocumentsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  # HTTP API exposed to Next.js client.
  DocuPilotApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins:
          - "http://localhost:3000"
          - "https://docu-pilot-client.vercel.app"
        AllowHeaders:
          - Authorization
          - Content-Type
        AllowMethods:
          - GET
          - POST
          - PUT
          - OPTIONS
      Auth:
        DefaultAuthorizer: ClerkJwtAuthorizer
        Authorizers:
          ClerkJwtAuthorizer:
            IdentitySource: "$request.header.Authorization"
            JwtConfiguration:
              issuer: !Ref ClerkIssuer
              audience:
                - !Ref ClerkAudience

  # Creates pre-signed upload URL and initial document record.
  CreateUploadUrlFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/functions/create-upload-url/handler.handler
      Policies:
        - Statement:
            Effect: Allow
            Action:
              - s3:PutObject
            Resource: !Sub "arn:aws:s3:::${DocumentsBucket}/*"
        - Statement:
            Effect: Allow
            Action:
              - dynamodb:PutItem
              - dynamodb:UpdateItem
            Resource: !GetAtt DocumentsTable.Arn
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref DocuPilotApi
            Path: /uploads
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Target: es2022
        Minify: true
        Sourcemap: true
        EntryPoints:
          - src/functions/create-upload-url/handler.ts

  # Triggered by S3 ObjectCreated event, starts Step Functions execution.
  StartProcessingFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/functions/start-processing/handler.handler
      Environment:
        Variables:
          STATE_MACHINE_ARN: !Ref DocumentProcessingStateMachine
      Policies:
        - Statement:
            Effect: Allow
            Action:
              - states:StartExecution
            Resource: !Ref DocumentProcessingStateMachine
        - Statement:
            Effect: Allow
            Action:
              - dynamodb:UpdateItem
            Resource: !GetAtt DocumentsTable.Arn
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Target: es2022
        Minify: true
        Sourcemap: true
        EntryPoints:
          - src/functions/start-processing/handler.ts

  DocumentsObjectCreatedRule:
    Type: AWS::Events::Rule
    Properties:
      Description: Route S3 object-created events in uploads/ to StartProcessingFunction.
      EventPattern:
        source:
          - aws.s3
        detail-type:
          - Object Created
        detail:
          bucket:
            name:
              - !Ref DocumentsBucket
          object:
            key:
              - prefix: uploads/
      Targets:
        - Arn: !GetAtt StartProcessingFunction.Arn
          Id: StartProcessingFunctionTarget

  StartProcessingEventBridgePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref StartProcessingFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt DocumentsObjectCreatedRule.Arn

  # Reads file content and calls Gemini.
  GeminiProcessDocumentFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/functions/gemini-process-document/handler.handler
      Timeout: 120
      MemorySize: 1024
      Environment:
        Variables:
          MOCK_GEMINI: "false"
          GEMINI_MODEL: "gemini-2.5-flash"
      Policies:
        - Statement:
            Effect: Allow
            Action:
              - s3:GetObject
            Resource: !Sub "arn:aws:s3:::${DocumentsBucket}/*"
        - Statement:
            Effect: Allow
            Action:
              - ssm:GetParameter
            Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/docupilot/${Stage}/*"
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Target: es2022
        Minify: true
        Sourcemap: true
        EntryPoints:
          - src/functions/gemini-process-document/handler.ts

  # Persists model output into DynamoDB.
  PersistResultsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/functions/persist-results/handler.handler
      Policies:
        - Statement:
            Effect: Allow
            Action:
              - dynamodb:UpdateItem
              - dynamodb:PutItem
            Resource: !GetAtt DocumentsTable.Arn
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Target: es2022
        Minify: true
        Sourcemap: true
        EntryPoints:
          - src/functions/persist-results/handler.ts

  # Stores approval token/state used for human approval step.
  RecordApprovalTokenFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/functions/record-approval-token/handler.handler
      Policies:
        - Statement:
            Effect: Allow
            Action:
              - dynamodb:UpdateItem
              - dynamodb:PutItem
            Resource: !GetAtt DocumentsTable.Arn
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Target: es2022
        Minify: true
        Sourcemap: true
        EntryPoints:
          - src/functions/record-approval-token/handler.ts

  # Callback endpoint for approve/reject action.
  ApproveDocumentFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/functions/approve-document/handler.handler
      Policies:
        - Statement:
            Effect: Allow
            Action:
              - dynamodb:GetItem
              - dynamodb:UpdateItem
            Resource: !GetAtt DocumentsTable.Arn
        - Statement:
            Effect: Allow
            Action:
              - states:SendTaskSuccess
              - states:SendTaskFailure
            # Step Functions callback actions require wildcard resource.
            Resource: "*"
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref DocuPilotApi
            Path: /documents/{documentId}/approval
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Target: es2022
        Minify: true
        Sourcemap: true
        EntryPoints:
          - src/functions/approve-document/handler.ts

  # Lists documents for the dashboard.
  ListDocumentsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/functions/list-documents/handler.handler
      Policies:
        - Statement:
            Effect: Allow
            Action:
              - dynamodb:Query
              - dynamodb:Scan
            Resource: !GetAtt DocumentsTable.Arn
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref DocuPilotApi
            Path: /documents
            Method: GET
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Target: es2022
        Minify: true
        Sourcemap: true
        EntryPoints:
          - src/functions/list-documents/handler.ts

  # Returns one document by id.
  GetDocumentFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/functions/get-document/handler.handler
      Policies:
        - Statement:
            Effect: Allow
            Action:
              - dynamodb:GetItem
              - dynamodb:Query
            Resource: !GetAtt DocumentsTable.Arn
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref DocuPilotApi
            Path: /documents/{documentId}
            Method: GET
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Target: es2022
        Minify: true
        Sourcemap: true
        EntryPoints:
          - src/functions/get-document/handler.ts

  # Marks processing record as failed from workflow catch path.
  MarkFailedFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/functions/mark-failed/handler.handler
      Policies:
        - Statement:
            Effect: Allow
            Action:
              - dynamodb:UpdateItem
            Resource: !GetAtt DocumentsTable.Arn
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Target: es2022
        Minify: true
        Sourcemap: true
        EntryPoints:
          - src/functions/mark-failed/handler.ts

  # Orchestrates document processing lifecycle.
  DocumentProcessingStateMachine:
    Type: AWS::Serverless::StateMachine
    Properties:
      Type: STANDARD
      DefinitionUri: statemachines/document-processing.asl.json
      DefinitionSubstitutions:
        GeminiProcessDocumentFunctionArn: !GetAtt GeminiProcessDocumentFunction.Arn
        PersistResultsFunctionArn: !GetAtt PersistResultsFunction.Arn
        RecordApprovalTokenFunctionArn: !GetAtt RecordApprovalTokenFunction.Arn
        MarkFailedFunctionArn: !GetAtt MarkFailedFunction.Arn
      Policies:
        - LambdaInvokePolicy:
            FunctionName: !Ref GeminiProcessDocumentFunction
        - LambdaInvokePolicy:
            FunctionName: !Ref PersistResultsFunction
        - LambdaInvokePolicy:
            FunctionName: !Ref RecordApprovalTokenFunction
        - LambdaInvokePolicy:
            FunctionName: !Ref MarkFailedFunction

  # CloudWatch dashboard for quick operational visibility.
  DocuPilotDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Sub "docupilot-${Stage}"
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "metric",
              "x": 0,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "title": "Lambda Errors (Key Functions)",
                "view": "timeSeries",
                "region": "${AWS::Region}",
                "stat": "Sum",
                "period": 300,
                "metrics": [
                  [ "AWS/Lambda", "Errors", "FunctionName", "${CreateUploadUrlFunction}" ],
                  [ ".", ".", "FunctionName", "${StartProcessingFunction}" ],
                  [ ".", ".", "FunctionName", "${GeminiProcessDocumentFunction}" ],
                  [ ".", ".", "FunctionName", "${PersistResultsFunction}" ],
                  [ ".", ".", "FunctionName", "${ApproveDocumentFunction}" ]
                ]
              }
            },
            {
              "type": "metric",
              "x": 12,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "title": "Step Functions ExecutionsFailed",
                "view": "timeSeries",
                "region": "${AWS::Region}",
                "stat": "Sum",
                "period": 300,
                "metrics": [
                  [ "AWS/States", "ExecutionsFailed", "StateMachineArn", "${DocumentProcessingStateMachine}" ]
                ]
              }
            },
            {
              "type": "metric",
              "x": 0,
              "y": 6,
              "width": 12,
              "height": 6,
              "properties": {
                "title": "HTTP API 5xx",
                "view": "timeSeries",
                "region": "${AWS::Region}",
                "stat": "Sum",
                "period": 300,
                "metrics": [
                  [ "AWS/ApiGateway", "5xx", "ApiId", "${DocuPilotApi}", "Stage", "$default" ]
                ]
              }
            }
          ]
        }

  # Alarm when key Lambda functions emit errors.
  GeminiProcessDocumentErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "docupilot-${Stage}-gemini-errors"
      AlarmDescription: !Sub "Errors > 0 for ${GeminiProcessDocumentFunction} in 5 minutes."
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref GeminiProcessDocumentFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

  StartProcessingErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "docupilot-${Stage}-start-processing-errors"
      AlarmDescription: !Sub "Errors > 0 for ${StartProcessingFunction} in 5 minutes."
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref StartProcessingFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

  ApproveDocumentErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "docupilot-${Stage}-approve-errors"
      AlarmDescription: !Sub "Errors > 0 for ${ApproveDocumentFunction} in 5 minutes."
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref ApproveDocumentFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

  # Alarm when state machine executions fail.
  StepFunctionsExecutionsFailedAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "docupilot-${Stage}-stepfunctions-failed"
      AlarmDescription: !Sub "ExecutionsFailed > 0 for ${DocumentProcessingStateMachine} in 5 minutes."
      Namespace: AWS/States
      MetricName: ExecutionsFailed
      Dimensions:
        - Name: StateMachineArn
          Value: !Ref DocumentProcessingStateMachine
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

  # Alarm when HTTP API returns server-side errors.
  ApiGateway5xxAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "docupilot-${Stage}-api-5xx"
      AlarmDescription: "HTTP API 5xx responses > 0 in 5 minutes."
      Namespace: AWS/ApiGateway
      MetricName: 5xx
      Dimensions:
        - Name: ApiId
          Value: !Ref DocuPilotApi
        - Name: Stage
          Value: "$default"
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

Outputs:
  ApiUrl:
    Description: Base URL for DocuPilot HTTP API.
    Value: !Sub "https://${DocuPilotApi}.execute-api.${AWS::Region}.amazonaws.com"

  BucketName:
    Description: Upload bucket name.
    Value: !Ref DocumentsBucket

  DocumentsBucketName:
    Description: Upload bucket name.
    Value: !Ref DocumentsBucket

  DocumentsTableName:
    Description: DynamoDB table name.
    Value: !Ref DocumentsTable

  StateMachineArn:
    Description: Step Functions state machine ARN.
    Value: !Ref DocumentProcessingStateMachine

  StartProcessingFunctionName:
    Description: Lambda function name for S3 start-processing trigger.
    Value: !Ref StartProcessingFunction
