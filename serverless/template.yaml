AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: DocuPilot backend

Parameters:
  Stage:
    Type: String
    Default: dev

  ClerkIssuer:
    Type: String
    Description: Clerk JWT issuer URL from the JWT `iss` claim.

  ClerkAudience:
    Type: String
    Description: Clerk JWT audience from the JWT `aud` claim.
    Default: docupilot-api

  GeminiApiKeyParameterName:
    Type: String
    Description: SSM parameter name that stores the Gemini API key.
    Default: /docupilot/dev/GEMINI_API_KEY

Globals:
  Function:
    # Keep nodejs20.x for now. If your region/account rejects it, switch to nodejs22.x.
    Runtime: nodejs20.x
    Architectures:
      - arm64
    Timeout: 30
    MemorySize: 512
    Tracing: Active
    Environment:
      Variables:
        STAGE: !Ref Stage
        DOCUMENTS_TABLE: !Ref DocumentsTable
        DOCUMENTS_BUCKET: !Ref DocumentsBucket
        GEMINI_API_KEY_PARAMETER: !Ref GeminiApiKeyParameterName

Resources:
  # S3 bucket for original document uploads.
  DocumentsBucket:
    Type: AWS::S3::Bucket
    Properties:
      NotificationConfiguration:
        EventBridgeConfiguration:
          EventBridgeEnabled: true
      CorsConfiguration:
        CorsRules:
          - AllowedMethods: [PUT, GET, HEAD]
            AllowedOrigins:
              - "http://localhost:3000"
            AllowedHeaders: ["*"]
            MaxAge: 3000

  # DynamoDB table with composite primary key (PK, SK).
  DocumentsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  # HTTP API exposed to Next.js client.
  DocuPilotApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins:
          - "http://localhost:3000"
        AllowHeaders:
          - Authorization
          - Content-Type
        AllowMethods:
          - GET
          - POST
          - OPTIONS
      Auth:
        DefaultAuthorizer: ClerkJwtAuthorizer
        Authorizers:
          ClerkJwtAuthorizer:
            IdentitySource: "$request.header.Authorization"
            JwtConfiguration:
              issuer: !Ref ClerkIssuer
              audience:
                - !Ref ClerkAudience

  # Creates pre-signed upload URL and initial document record.
  CreateUploadUrlFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/functions/create-upload-url/handler.handler
      Policies:
        - Statement:
            Effect: Allow
            Action:
              - s3:PutObject
            Resource: !Sub "arn:aws:s3:::${DocumentsBucket}/*"
        - Statement:
            Effect: Allow
            Action:
              - dynamodb:PutItem
              - dynamodb:UpdateItem
            Resource: !GetAtt DocumentsTable.Arn
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref DocuPilotApi
            Path: /uploads
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Target: es2022
        Minify: true
        Sourcemap: true
        EntryPoints:
          - src/functions/create-upload-url/handler.ts

  # Triggered by S3 ObjectCreated event, starts Step Functions execution.
  StartProcessingFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/functions/start-processing/handler.handler
      Environment:
        Variables:
          STATE_MACHINE_ARN: !Ref DocumentProcessingStateMachine
      Policies:
        - Statement:
            Effect: Allow
            Action:
              - states:StartExecution
            Resource: !Ref DocumentProcessingStateMachine
        - Statement:
            Effect: Allow
            Action:
              - dynamodb:UpdateItem
            Resource: !GetAtt DocumentsTable.Arn
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Target: es2022
        Minify: true
        Sourcemap: true
        EntryPoints:
          - src/functions/start-processing/handler.ts

  DocumentsObjectCreatedRule:
    Type: AWS::Events::Rule
    Properties:
      Description: Route S3 object-created events in uploads/ to StartProcessingFunction.
      EventPattern:
        source:
          - aws.s3
        detail-type:
          - Object Created
        detail:
          bucket:
            name:
              - !Ref DocumentsBucket
          object:
            key:
              - prefix: uploads/
      Targets:
        - Arn: !GetAtt StartProcessingFunction.Arn
          Id: StartProcessingFunctionTarget

  StartProcessingEventBridgePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref StartProcessingFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt DocumentsObjectCreatedRule.Arn

  # Reads file content and calls Gemini.
  GeminiProcessDocumentFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/functions/gemini-process-document/handler.handler
      Timeout: 120
      MemorySize: 1024
      Environment:
        Variables:
          MOCK_GEMINI: "false"
          GEMINI_MODEL: "gemini-2.5-flash"
      Policies:
        - Statement:
            Effect: Allow
            Action:
              - s3:GetObject
            Resource: !Sub "arn:aws:s3:::${DocumentsBucket}/*"
        - Statement:
            Effect: Allow
            Action:
              - ssm:GetParameter
            Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/docupilot/${Stage}/*"
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Target: es2022
        Minify: true
        Sourcemap: true
        EntryPoints:
          - src/functions/gemini-process-document/handler.ts

  # Persists model output into DynamoDB.
  PersistResultsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/functions/persist-results/handler.handler
      Policies:
        - Statement:
            Effect: Allow
            Action:
              - dynamodb:UpdateItem
              - dynamodb:PutItem
            Resource: !GetAtt DocumentsTable.Arn
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Target: es2022
        Minify: true
        Sourcemap: true
        EntryPoints:
          - src/functions/persist-results/handler.ts

  # Stores approval token/state used for human approval step.
  RecordApprovalTokenFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/functions/record-approval-token/handler.handler
      Policies:
        - Statement:
            Effect: Allow
            Action:
              - dynamodb:UpdateItem
              - dynamodb:PutItem
            Resource: !GetAtt DocumentsTable.Arn
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Target: es2022
        Minify: true
        Sourcemap: true
        EntryPoints:
          - src/functions/record-approval-token/handler.ts

  # Callback endpoint for approve/reject action.
  ApproveDocumentFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/functions/approve-document/handler.handler
      Policies:
        - Statement:
            Effect: Allow
            Action:
              - dynamodb:GetItem
              - dynamodb:UpdateItem
            Resource: !GetAtt DocumentsTable.Arn
        - Statement:
            Effect: Allow
            Action:
              - states:SendTaskSuccess
              - states:SendTaskFailure
            # Step Functions callback actions require wildcard resource.
            Resource: "*"
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref DocuPilotApi
            Path: /documents/{documentId}/approval
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Target: es2022
        Minify: true
        Sourcemap: true
        EntryPoints:
          - src/functions/approve-document/handler.ts

  # Lists documents for the dashboard.
  ListDocumentsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/functions/list-documents/handler.handler
      Policies:
        - Statement:
            Effect: Allow
            Action:
              - dynamodb:Query
              - dynamodb:Scan
            Resource: !GetAtt DocumentsTable.Arn
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref DocuPilotApi
            Path: /documents
            Method: GET
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Target: es2022
        Minify: true
        Sourcemap: true
        EntryPoints:
          - src/functions/list-documents/handler.ts

  # Returns one document by id.
  GetDocumentFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/functions/get-document/handler.handler
      Policies:
        - Statement:
            Effect: Allow
            Action:
              - dynamodb:GetItem
              - dynamodb:Query
            Resource: !GetAtt DocumentsTable.Arn
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref DocuPilotApi
            Path: /documents/{documentId}
            Method: GET
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Target: es2022
        Minify: true
        Sourcemap: true
        EntryPoints:
          - src/functions/get-document/handler.ts

  # Marks processing record as failed from workflow catch path.
  MarkFailedFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/functions/mark-failed/handler.handler
      Policies:
        - Statement:
            Effect: Allow
            Action:
              - dynamodb:UpdateItem
            Resource: !GetAtt DocumentsTable.Arn
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Target: es2022
        Minify: true
        Sourcemap: true
        EntryPoints:
          - src/functions/mark-failed/handler.ts

  # Orchestrates document processing lifecycle.
  DocumentProcessingStateMachine:
    Type: AWS::Serverless::StateMachine
    Properties:
      Type: STANDARD
      DefinitionUri: statemachines/document-processing.asl.json
      DefinitionSubstitutions:
        GeminiProcessDocumentFunctionArn: !GetAtt GeminiProcessDocumentFunction.Arn
        PersistResultsFunctionArn: !GetAtt PersistResultsFunction.Arn
        RecordApprovalTokenFunctionArn: !GetAtt RecordApprovalTokenFunction.Arn
        MarkFailedFunctionArn: !GetAtt MarkFailedFunction.Arn
      Policies:
        - LambdaInvokePolicy:
            FunctionName: !Ref GeminiProcessDocumentFunction
        - LambdaInvokePolicy:
            FunctionName: !Ref PersistResultsFunction
        - LambdaInvokePolicy:
            FunctionName: !Ref RecordApprovalTokenFunction
        - LambdaInvokePolicy:
            FunctionName: !Ref MarkFailedFunction

Outputs:
  ApiUrl:
    Description: Base URL for DocuPilot HTTP API.
    Value: !Sub "https://${DocuPilotApi}.execute-api.${AWS::Region}.amazonaws.com"

  BucketName:
    Description: Upload bucket name.
    Value: !Ref DocumentsBucket

  DocumentsBucketName:
    Description: Upload bucket name.
    Value: !Ref DocumentsBucket

  DocumentsTableName:
    Description: DynamoDB table name.
    Value: !Ref DocumentsTable

  StateMachineArn:
    Description: Step Functions state machine ARN.
    Value: !Ref DocumentProcessingStateMachine

  StartProcessingFunctionName:
    Description: Lambda function name for S3 start-processing trigger.
    Value: !Ref StartProcessingFunction
