name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  client:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml

      - name: Enable Corepack and pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9 --activate
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: client

      - name: Lint
        run: pnpm run lint
        working-directory: client

      - name: Typecheck (if script exists)
        working-directory: client
        run: |
          if node -e "const p=require('./package.json'); process.exit(p.scripts?.typecheck ? 0 : 1)"; then
            pnpm run typecheck
          else
            echo "No client typecheck script found; skipping."
          fi

      - name: Build
        run: pnpm run build
        working-directory: client

  serverless:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: serverless/pnpm-lock.yaml

      - name: Enable Corepack and pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9 --activate
          pnpm --version

      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: serverless

      - name: Typecheck
        run: pnpm run typecheck
        working-directory: serverless

      - name: Tests
        run: pnpm run test
        working-directory: serverless

      - name: SAM validate
        run: pnpm run validate:sam
        working-directory: serverless

      - name: SAM build
        run: sam build
        working-directory: serverless
